<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TASUKI STRETCH の店舗アクセスページ" />
  <title>店舗・アクセス | TASUKI STRETCH</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div id="shared-menu" data-menu-src="../partials/menu.html" data-base-prefix="../"></div>
    </div>
  </header>

  <main class="section access-page subpage-main">
    <div class="container">
      <div class="section-head">
        <h1 class="en-title">店舗・アクセス</h1>
        <p>スタジオ所在地・営業時間・アクセス情報</p>
      </div>

      <p class="hero-sub">お近くの店舗へ気軽にお越しください。</p>

      <section class="store-list" aria-label="店舗一覧">
        <article class="store-card">
          <div class="store-info">
            <h2 class="store-name">TASUKI STRETCH 新宿店</h2>
            <dl class="store-meta">
              <div>
                <dt>営業時間</dt>
                <dd>
                  平日：9:00 - 21:30（最終受付 20:00）<br />
                  土日祝：9:00 - 21:30（最終受付 20:00）<br />
                </dd>
              </div>
            </dl>

            <div class="store-sns" aria-label="SNSリンク">
              <p class="store-sns-title">SNS・ブログ</p>
              <div class="store-sns-links">
                <a class="store-sns-link store-sns-link--instagram" href="https://www.instagram.com/tasuki_stretch/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                  <img src="../images/social/instagram.svg" alt="Instagram" />
                  <span class="store-sns-label">Instagram</span>
                </a>
                <a class="store-sns-link store-sns-link--threads" href="https://www.threads.com/@tasuki_stretch" target="_blank" rel="noopener noreferrer" aria-label="Threads">
                  <img src="../images/social/threads.svg" alt="Threads" />
                  <span class="store-sns-label">Threads</span>
                </a>
              </div>
            </div>

            <dl class="store-meta">
              <div>
                <dt>住所</dt>
                <dd>〒160-0023 東京都新宿区西新宿1丁目23-23 TK 新都心ビル B1F</dd>
              </div>
            </dl>
          </div>
          <div class="store-map" aria-label="TASUKI STRETCH 新宿店の地図">
            <iframe
              src="https://www.google.com/maps?output=embed&z=17&q=%E3%80%92160-0023%20%E6%9D%B1%E4%BA%AC%E9%83%BD%E6%96%B0%E5%AE%BF%E5%8C%BA%E8%A5%BF%E6%96%B0%E5%AE%BF1%E4%B8%81%E7%9B%AE23-23%20TK%20%E6%96%B0%E9%83%BD%E5%BF%83%E3%83%93%E3%83%AB%20B1F"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="TASUKI STRETCH 新宿店 Googleマップ"
            ></iframe>
          </div>
          <div class="store-card-cta">
            <a class="btn" href="https://reserva.be/tasukistretch/reserve?mode=service_staff&search_evt_no=65eJwzNTYyMTUGAAREATc" target="_blank" rel="noopener noreferrer">レッスンスケジュール　→</a>
          </div>
        </article>
      </section>
    </div>
  </main>

  <div id="shared-footer" data-footer-src="../partials/footer.html" data-base-prefix="../"></div>
  <script src="../menu-loader.js" defer></script>
  <script src="../footer-loader.js" defer></script>
</body>
</html>
