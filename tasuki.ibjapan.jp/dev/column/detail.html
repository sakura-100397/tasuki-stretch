<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TASUKI STRETCH のコラム詳細ページ" />
  <title>コラム詳細 | TASUKI STRETCH</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .column-detail-main {
      padding-bottom: 80px;
    }

    .column-detail-wrap {
      border: 1px solid rgba(197, 160, 90, .25);
      border-radius: 18px;
      background: rgba(255, 253, 248, .92);
      box-shadow: 0 10px 24px rgba(70, 55, 38, .08);
      padding: 24px;
    }

    .column-back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #8a6b32;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .column-detail-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      color: #2f2924;
      line-height: 1.4;
    }

    .column-detail-date {
      margin-top: 10px;
      color: #666;
      font-size: 18px;
    }

    .column-detail-body {
      margin-top: 22px;
      line-height: 1.9;
      color: #3f382f;
    }

    .column-detail-body img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    @media (max-width: 980px) {
      .column-detail-main {
        padding-bottom: 64px;
      }

      .column-detail-wrap {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div id="shared-menu" data-menu-src="../partials/menu.html" data-base-prefix="../"></div>
    </div>
  </header>

  <main class="column-detail-main subpage-main">
    <div class="container">
      <article class="column-detail-wrap">
        <a class="column-back-link" href="./index.html">一覧へ戻る</a>
        <h1 id="detail-title" class="column-detail-title">読み込み中...</h1>
        <p id="detail-date" class="column-detail-date"></p>
        <div id="detail-body" class="column-detail-body"></div>
      </article>
    </div>
  </main>

  <div id="shared-footer" data-footer-src="../partials/footer.html" data-base-prefix="../"></div>

  <script src="../menu-loader.js" defer></script>
  <script src="../footer-loader.js" defer></script>
  <script>
    const serviceDomain = "tasukistretch";
    const endpoint = "columns";
    const apiKey = "JdbLAgto6xPD0Mi7eTDRIObcZEN55XwqLXF1";

    function formatDate(dateText) {
      if (!dateText) return "";
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
    }

    function getBodyContent(post) {
      const bodyCandidates = ["content", "body", "description", "text"];
      for (const key of bodyCandidates) {
        if (typeof post[key] === "string" && post[key].trim()) {
          return post[key];
        }
      }
      return "";
    }

    async function fetchDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const titleEl = document.getElementById("detail-title");
      const dateEl = document.getElementById("detail-date");
      const bodyEl = document.getElementById("detail-body");

      if (!id) {
        titleEl.textContent = "記事IDが指定されていません。";
        return;
      }

      try {
        const response = await fetch(`https://${serviceDomain}.microcms.io/api/v1/${endpoint}/${encodeURIComponent(id)}`, {
          headers: {
            "X-MICROCMS-API-KEY": apiKey
          }
        });

        if (!response.ok) throw new Error("記事の取得に失敗しました");

        const post = await response.json();
        titleEl.textContent = post.title || "タイトル未設定";
        dateEl.textContent = formatDate(post.publishedAt || post.createdAt);

        const body = getBodyContent(post);
        if (body) {
          bodyEl.innerHTML = body;
        } else {
          bodyEl.textContent = "本文フィールドが見つかりませんでした。";
        }
      } catch (error) {
        console.error(error);
        titleEl.textContent = "記事を読み込めませんでした。";
        dateEl.textContent = "";
        bodyEl.textContent = "設定をご確認ください。";
      }
    }

    fetchDetail();
  </script>
</body>
</html>
