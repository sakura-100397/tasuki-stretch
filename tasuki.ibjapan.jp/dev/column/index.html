<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TASUKI STRETCH の美・健康コラムページ" />
  <title>美・健康コラム | TASUKI STRETCH</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .blog-list-wrap {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid rgba(197, 160, 90, .25);
      border-radius: 16px;
      background: rgba(255, 253, 248, .92);
      box-shadow: 0 10px 24px rgba(70, 55, 38, .08);
    }

    .column-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 10px;
      align-items: start;
    }

    .blog-list-title {
      margin: 0 0 16px;
      font-size: 26px;
      color: #2f2924;
    }

    #blog-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .blog-item {
      overflow: hidden;
      border: 1px solid rgba(197, 160, 90, .2);
      border-radius: 16px;
      background: rgba(255, 253, 248, .95);
      box-shadow: 0 10px 24px rgba(70, 55, 38, .08);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .blog-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(70, 55, 38, .12);
    }

    .blog-item a {
      display: grid;
      color: inherit;
      text-decoration: none;
    }

    .blog-eyecatch {
      aspect-ratio: 16 / 10;
      width: 100%;
      object-fit: cover;
      background: rgba(197, 160, 90, .12);
    }

    .blog-copy {
      display: grid;
      gap: 8px;
      padding: 14px 14px 16px;
    }

    .blog-title {
      margin: 0;
      color: #2f2924;
      font-size: var(--font-sm);
      line-height: 1.5;
      font-weight: 700;
    }

    .blog-card-category {
      display: inline-flex;
      width: fit-content;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(197, 160, 90, .28);
      background: rgba(255, 255, 255, .84);
      color: #5f554a;
      font-size: var(--font-xs);
      line-height: 1.2;
      letter-spacing: .04em;
    }

    .blog-heading {
      margin: 0;
      color: rgba(71, 61, 53, .82);
      font-size: var(--font-xs);
      line-height: 1.7;
    }

    .blog-empty {
      padding: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .72);
    }

    .blog-category-wrap {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid rgba(197, 160, 90, .25);
      border-radius: 16px;
      background: rgba(255, 253, 248, .92);
      box-shadow: 0 10px 24px rgba(70, 55, 38, .08);
      position: sticky;
      top: 128px;
    }

    .blog-category-title {
      margin: 0 0 16px;
      font-size: 20px;
      color: #2f2924;
    }

    .blog-category-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .blog-category-list li {
      flex: 1 1 calc(50% - 10px);
      min-width: 96px;
    }

    .blog-category-item {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(197, 160, 90, .28);
      background: rgba(255, 255, 255, .84);
      color: #5f554a;
      text-align: center;
      font-size: 16px;
      line-height: 1.3;
      letter-spacing: .04em;
      white-space: nowrap;
      cursor: pointer;
      transition: background-color .2s ease, color .2s ease, border-color .2s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .blog-category-item.is-active {
      border-color: #c5a05a;
      background: #c5a05a;
      color: #fffdf8;
    }

    @media (max-width: 980px) {
      .column-layout {
        grid-template-columns: 1fr;
      }

      #blog-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .blog-category-wrap {
        position: static;
      }
    }

    @media (max-width: 600px) {
      .section-head {
        margin-bottom: 24px;
      }

      .column-layout {
        display: flex;
        flex-direction: column-reverse;
        gap: 9px;
      }

      #blog-list {
        grid-template-columns: 1fr;
      }

      .blog-list-wrap,
      .blog-category-wrap {
        padding: 16px;
      }

      .blog-list-wrap {
        margin-top: 0;
      }

      .blog-category-wrap {
        margin-top: 0;
      }

      .blog-category-list li {
        flex: 0 0 auto;
        min-width: auto;
      }

      .blog-category-list {
        flex-wrap: wrap;
        overflow: visible;
      }

      .blog-category-item {
        font-size: var(--font-xs);
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div id="shared-menu" data-menu-src="../partials/menu.html" data-base-prefix="../"></div>
    </div>
  </header>

  <main class="section subpage-main">
    <div class="container">
      <div class="section-head">
        <h1 class="en-title">美・健康コラム</h1>
        <p>日常で活かせる巡りの知識とセルフケア情報</p>
      </div>

      <div class="column-layout">
        <section class="blog-list-wrap" aria-labelledby="blog-list-title">
          <h2 id="blog-list-title" class="blog-list-title">新着のコラム一覧</h2>
          <ul id="blog-list">
            <li class="blog-empty">読み込み中...</li>
          </ul>
        </section>

        <aside class="blog-category-wrap" aria-labelledby="blog-category-title">
          <h2 id="blog-category-title" class="blog-category-title">カテゴリ</h2>
          <ul id="blog-category-list" class="blog-category-list" aria-label="コラムカテゴリ一覧">
            <li class="blog-empty">読み込み中...</li>
          </ul>
        </aside>
      </div>
    </div>
  </main>

  <div id="shared-footer" data-footer-src="../partials/footer.html" data-base-prefix="../"></div>

  <script src="../menu-loader.js" defer></script>
  <script src="../footer-loader.js" defer></script>
  <script>
    // ご自身のMicroCMSの情報に書き換えてください
    const serviceDomain = "tasukistretch"; // 例: my-service-site
    const endpoint = "columns"; // 例: blogs
    const categoryEndpoint = "categories"; // 例: categories
    const apiKey = "JdbLAgto6xPD0Mi7eTDRIObcZEN55XwqLXF1"; // 取得したAPIキー
    const allCategoryLabel = "すべて";

    let allPosts = [];
    let categoryOptions = [];
    let selectedCategory = "";

    function formatDate(dateText) {
      if (!dateText) return "";
      const date = new Date(dateText);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
    }

    function getEyecatchUrl(post) {
      const eyecatch = post.eyecatch || post.eyecatchImage || post.thumbnail || post.image;
      if (!eyecatch) return "";
      if (typeof eyecatch === "string") return eyecatch;
      return typeof eyecatch === "object" && eyecatch.url ? eyecatch.url : "";
    }

    function getContentHeading(post) {
      const bodyCandidates = ["content", "body", "description", "text"];
      let source = "";

      for (const key of bodyCandidates) {
        if (typeof post[key] === "string" && post[key].trim()) {
          source = post[key].trim();
          break;
        }
      }

      if (!source) return "";

      const parser = new DOMParser();
      const doc = parser.parseFromString(source, "text/html");
      const heading = doc.querySelector("h1, h2, h3, h4");
      const headingText = heading ? heading.textContent.trim() : "";
      if (headingText) return headingText;

      const textContent = doc.body ? doc.body.textContent.trim() : source.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
      if (!textContent) return "";
      return textContent.length > 42 ? `${textContent.slice(0, 42)}…` : textContent;
    }

    function normalizeCategoryLabel(category) {
      if (!category) return "";
      if (typeof category === "string") return category.trim();

      if (typeof category === "object") {
        const labelCandidates = ["name", "title", "label", "category", "categoryName", "tag"];
        for (const key of labelCandidates) {
          const value = category[key];
          if (typeof value === "string" && value.trim()) {
            return value.trim();
          }
        }
      }

      return "";
    }

    function extractCategories(post) {
      const categoryFieldCandidates = ["category", "categories", "tag", "tags", "genre", "genres"];
      const categories = [];

      for (const key of categoryFieldCandidates) {
        const value = post[key];
        if (!value) continue;

        if (Array.isArray(value)) {
          value.forEach((item) => {
            const label = normalizeCategoryLabel(item);
            if (label) categories.push(label);
          });
          continue;
        }

        const label = normalizeCategoryLabel(value);
        if (label) categories.push(label);
      }

      return categories;
    }

    function setSelectedCategory(category) {
      selectedCategory = category === selectedCategory ? "" : category;
      renderCategoryList(categoryOptions);
      renderBlogList(allPosts);
    }

    function renderCategoryList(categoryLabels) {
      const categoryListElement = document.getElementById("blog-category-list");
      if (!categoryListElement) return;

      const uniqueCategories = Array.from(new Set(categoryLabels.filter(Boolean)));
      categoryOptions = uniqueCategories;

      categoryListElement.innerHTML = "";

      const categoriesToRender = [allCategoryLabel, ...uniqueCategories];

      categoriesToRender.forEach((category) => {
        const li = document.createElement("li");
        const item = document.createElement("button");
        item.type = "button";
        item.className = "blog-category-item";
        item.textContent = category;
        const isActive = category === allCategoryLabel ? !selectedCategory : category === selectedCategory;
        item.setAttribute("aria-pressed", String(isActive));
        if (isActive) {
          item.classList.add("is-active");
        }
        item.addEventListener("click", () => {
          setSelectedCategory(category === allCategoryLabel ? "" : category);
        });
        li.appendChild(item);
        categoryListElement.appendChild(li);
      });
    }

    async function fetchCategories() {
      try {
        const response = await fetch(`https://${serviceDomain}.microcms.io/api/v1/${categoryEndpoint}?limit=100`, {
          headers: {
            "X-MICROCMS-API-KEY": apiKey
          }
        });

        if (!response.ok) throw new Error("カテゴリデータの取得に失敗しました");

        const data = await response.json();
        const contents = Array.isArray(data.contents) ? data.contents : [];
        const categoryLabels = contents.map((item) => normalizeCategoryLabel(item)).filter(Boolean);
        renderCategoryList(categoryLabels);
      } catch (error) {
        console.error(error);
        const categoryListElement = document.getElementById("blog-category-list");
        if (categoryListElement) {
          categoryListElement.innerHTML = "<li class='blog-empty'>カテゴリを読み込めませんでした。</li>";
        }
      }
    }

    function getPrimaryCategory(post) {
      const categories = extractCategories(post);
      return categories[0] || "未分類";
    }

    function renderBlogList(posts) {
      const blogListElement = document.getElementById("blog-list");
      if (!blogListElement) return;

      blogListElement.innerHTML = "";

      const filteredPosts = selectedCategory
        ? posts.filter((post) => extractCategories(post).includes(selectedCategory))
        : posts;

      if (!posts.length) {
        blogListElement.innerHTML = "<li class='blog-empty'>記事がありません。</li>";
        return;
      }

      if (!filteredPosts.length) {
        blogListElement.innerHTML = "<li class='blog-empty'>該当する記事がありません。</li>";
        return;
      }

      filteredPosts.forEach((post) => {
        const li = document.createElement("li");
        li.className = "blog-item";

        const link = document.createElement("a");
        link.href = `./detail.html?id=${encodeURIComponent(post.id)}`;
        link.setAttribute("aria-label", post.title || "タイトル未設定");

        const eyecatchUrl = getEyecatchUrl(post);
        const img = document.createElement("img");
        img.className = "blog-eyecatch";
        img.src = eyecatchUrl || "../images/tasuki-logo.png";
        img.alt = post.title || "ブログのアイキャッチ画像";
        img.loading = "lazy";

        const copy = document.createElement("div");
        copy.className = "blog-copy";

        const category = document.createElement("p");
        category.className = "blog-card-category";
        category.textContent = getPrimaryCategory(post);

        const title = document.createElement("h3");
        title.className = "blog-title";
        title.textContent = post.title || "タイトル未設定";

        const heading = document.createElement("p");
        heading.className = "blog-heading";
        heading.textContent = getContentHeading(post) || formatDate(post.publishedAt) || "";

        copy.appendChild(category);
        copy.appendChild(title);
        copy.appendChild(heading);

        link.appendChild(img);
        link.appendChild(copy);
        li.appendChild(link);
        blogListElement.appendChild(li);
      });
    }

    async function fetchBlogs() {
      try {
        const response = await fetch(`https://${serviceDomain}.microcms.io/api/v1/${endpoint}?limit=15&orders=-publishedAt&depth=2`, {
          headers: {
            "X-MICROCMS-API-KEY": apiKey
          }
        });

        if (!response.ok) throw new Error("データの取得に失敗しました");

        const data = await response.json();
        if (!data.contents || data.contents.length === 0) {
          allPosts = [];
          renderBlogList(allPosts);
          return;
        }

        allPosts = data.contents;
        renderBlogList(allPosts);

        const categoriesFromPosts = allPosts.flatMap((post) => extractCategories(post));
        const mergedCategories = categoryOptions.length
          ? [...categoryOptions, ...categoriesFromPosts]
          : categoriesFromPosts;
        renderCategoryList(mergedCategories);
      } catch (error) {
        console.error(error);
        document.getElementById("blog-list").innerHTML = "<li class='blog-empty'>記事を読み込めませんでした。</li>";
      }
    }

    fetchBlogs();
    fetchCategories();
  </script>
</body>
</html>
