<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TASUKI STRETCH の美・健康コラムページ" />
  <title>美・健康コラム | TASUKI STRETCH</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .blog-list-wrap {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid rgba(197, 160, 90, .25);
      border-radius: 16px;
      background: rgba(255, 253, 248, .92);
      box-shadow: 0 10px 24px rgba(70, 55, 38, .08);
    }

    .blog-list-title {
      margin: 0 0 16px;
      font-size: 26px;
      color: #2f2924;
    }

    #blog-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .blog-item {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(197, 160, 90, .2);
    }

    .blog-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: 0;
    }

    .blog-date {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .blog-item a {
      color: #8a6b32;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="../index.html">
        <img src="../images/tasuki-logo.png" alt="TASUKI STRETCH ロゴ" />
        <span>TASUKI STRETCH</span>
      </a>
      <div id="shared-menu" data-menu-src="../partials/menu.html" data-base-prefix="../"></div>
    </div>
  </header>

  <main class="section" style="padding-top: 140px;">
    <div class="container">
      <div class="section-head">
        <h1 class="en-title">美・健康コラム</h1>
        <p>日常で活かせる巡りの知識とセルフケア情報</p>
      </div>

      <section class="blog-list-wrap" aria-labelledby="blog-list-title">
        <h2 id="blog-list-title" class="blog-list-title">最新のブログ記事</h2>
        <ul id="blog-list">
          <li>読み込み中...</li>
        </ul>
      </section>
    </div>
  </main>

  <div id="shared-footer" data-footer-src="../partials/footer.html" data-base-prefix="../"></div>

  <script src="../menu-loader.js" defer></script>
  <script src="../footer-loader.js" defer></script>
  <script>
    // ご自身のMicroCMSの情報に書き換えてください
    const serviceDomain = "tasukistretch"; // 例: my-service-site
    const endpoint = "columns"; // 例: blogs
    const apiKey = "JdbLAgto6xPD0Mi7eTDRIObcZEN55XwqLXF1"; // 取得したAPIキー

    async function fetchBlogs() {
      try {
        const response = await fetch(`https://${serviceDomain}.microcms.io/api/v1/${endpoint}`, {
          headers: {
            "X-MICROCMS-API-KEY": apiKey
          }
        });

        if (!response.ok) throw new Error("データの取得に失敗しました");

        const data = await response.json();
        const blogListElement = document.getElementById("blog-list");
        blogListElement.innerHTML = "";

        data.contents.forEach((post) => {
          const li = document.createElement("li");
          li.className = "blog-item";

          const date = new Date(post.publishedAt);
          const formattedDate = `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;

          const dateDiv = document.createElement("div");
          dateDiv.className = "blog-date";
          dateDiv.textContent = formattedDate;

          const link = document.createElement("a");
          link.href = `./detail.html?id=${encodeURIComponent(post.id)}`;
          link.textContent = post.title || "タイトル未設定";

          li.appendChild(dateDiv);
          li.appendChild(link);
          blogListElement.appendChild(li);
        });
      } catch (error) {
        console.error(error);
        document.getElementById("blog-list").innerHTML = "<li>記事を読み込めませんでした。</li>";
      }
    }

    fetchBlogs();
  </script>
</body>
</html>
